<text x="142" y="398" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">775+ messages</text>

<rect x="252" y="370" width="175" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="382" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#444441">Reaction system</text>
<text x="340" y="398" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">glimReact() handler</text>

<rect x="450" y="370" width="175" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="537" y="382" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#444441">Reminder timers</text>
<text x="537" y="398" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">wellness, move, eyes</text>

