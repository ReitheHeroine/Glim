<text x="300" y="102" text-anchor="end" dominant-baseline="central" font-size="12" fill="#5F5E5A">eyes, wings, tail, body</text>

<rect x="55" y="132" width="255" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
