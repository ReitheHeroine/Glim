<rect x="40" y="460" width="600" height="110" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="485" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#0C447C">Data layer</text>
<text x="340" y="503" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">stores everything, syncs across devices</text>

<rect x="55" y="520" width="175" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="142" y="532" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#444441">Zustand stores</text>
<text x="142" y="548" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">15 domains, in memory</text>

<rect x="252" y="520" width="175" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="532" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#444441">localStorage</text>
<text x="340" y="548" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">on-device persistence</text>

<rect x="450" y="520" width="175" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="537" y="532" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#444441">Firebase</text>
<text x="537" y="548" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">cloud sync + auth</text>

<!-- LAYER 4: Platform -->
<rect x="40" y="610" width="600" height="52" rx="16" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="630" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#444441">Platform foundation</text>
<text x="340" y="648" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Vite (build) · React (framework) · Tailwind (CSS) · Chart.js (charts) · PWA (offline)</text>

