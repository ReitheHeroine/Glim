<text x="182" y="73" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">what Glim looks and feels like</text>

<rect x="55" y="90" width="255" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
