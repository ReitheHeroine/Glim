<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: #fff;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Step 1 -->
<rect x="40" y="30" width="250" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="165" y="46" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#085041">1. You tap "+1 glass"</text>
<text x="165" y="64" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">water tracker panel</text>

<line x1="165" y1="78" x2="165" y2="118" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 2 -->
<rect x="40" y="118" width="250" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="165" y="136" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#0C447C">2. Event created + saved</text>
<text x="165" y="156" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">UUID generated, stored in</text>
<text x="165" y="168" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Zustand → localStorage</text>

<line x1="290" y1="146" x2="380" y2="146" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 3 -->
<rect x="380" y="118" width="260" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="510" y="136" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#633806">3. Reaction system fires</text>
<text x="510" y="156" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">glimReact('water_logged',</text>
<text x="510" y="168" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">{ current: 7, goal: 8 })</text>

<line x1="510" y1="174" x2="510" y2="214" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 4 -->
<rect x="380" y="214" width="260" height="48" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="510" y="230" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#633806">4. Message selected</text>
<text x="510" y="248" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">"nice! that's glass 7 of 8"</text>

<line x1="510" y1="262" x2="510" y2="302" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 5 -->
<rect x="380" y="302" width="260" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="510" y="318" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#3C3489">5. Glim reacts</text>
<text x="510" y="336" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">speech bubble + antenna perk</text>

<line x1="165" y1="174" x2="165" y2="260" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 6 -->
<rect x="40" y="260" width="250" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="165" y="276" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#085041">6. UI updates</text>
<text x="165" y="294" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">progress bar shows 7/8</text>

<!-- Separator -->
<line x1="40" y1="390" x2="640" y2="390" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>
<text x="340" y="410" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">later that day, you log glass #8...</text>

<!-- Step 7 -->
<rect x="40" y="430" width="250" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="165" y="446" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#085041">7. You tap "+1 glass" again</text>
<text x="165" y="464" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">total reaches 8/8</text>

<line x1="290" y1="454" x2="380" y2="454" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 8 -->
<rect x="380" y="430" width="260" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="510" y="448" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#633806">8. Goal detection</text>
<text x="510" y="468" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">glimReact('water_goal_met',</text>
<text x="510" y="480" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">{ streak: 4 })</text>

<line x1="510" y1="486" x2="510" y2="526" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 9 -->
<rect x="380" y="526" width="260" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="510" y="542" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#3C3489">9. Glim celebrates</text>
<text x="510" y="560" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">happy bounce + goal message</text>

<line x1="165" y1="478" x2="165" y2="526" stroke="#185FA5" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Step 10 -->
<rect x="40" y="526" width="250" height="48" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="165" y="542" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#0C447C">10. Background sync</text>
<text x="165" y="560" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Firebase pushes to desktop</text>

<line x1="165" y1="574" x2="165" y2="614" stroke="#185FA5" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Step 11 -->
<rect x="40" y="614" width="250" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="165" y="630" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="14" fill="#444441">11. Desktop Glim sees it</text>
<text x="165" y="648" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">"you hit your water goal!"</text>

<!-- Legend -->
<rect x="400" y="614" width="230" height="48" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="415" y1="630" x2="445" y2="630" stroke="#0F6E56" stroke-width="1.5"/>
<text x="452" y="630" dominant-baseline="central" font-size="12" fill="#5F5E5A">data flow</text>
<line x1="415" y1="648" x2="445" y2="648" stroke="#BA7517" stroke-width="1.5"/>
<text x="452" y="648" dominant-baseline="central" font-size="12" fill="#5F5E5A">personality flow</text>
<line x1="530" y1="630" x2="560" y2="630" stroke="#185FA5" stroke-width="1" stroke-dasharray="4 3"/>
<text x="567" y="630" dominant-baseline="central" font-size="12" fill="#5F5E5A">sync</text>
</svg>
