<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tater</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦤</text></svg>" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    #beach-canvas { position: absolute; top: 0; left: 0; z-index: 1; }
    #frond-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
    .frond-img { position: absolute; pointer-events: none; will-change: transform; }
    .sway1 { animation: sway1 6s ease-in-out infinite; }
    .sway2 { animation: sway2 7.5s ease-in-out infinite; }
    .sway3 { animation: sway3 8s ease-in-out infinite; }
    .sway4 { animation: sway4 5.5s ease-in-out infinite; }
    .sway5 { animation: sway5 9s ease-in-out infinite; }
    .sway6 { animation: sway6 7s ease-in-out infinite; }
    @keyframes sway1 { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(1.5deg)} }
    @keyframes sway2 { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-1.3deg)} }
    @keyframes sway3 { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(1.8deg)} }
    @keyframes sway4 { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-1deg)} }
    @keyframes sway5 { 0%,100%{transform:rotate(0deg)} 30%{transform:rotate(1.5deg)} 70%{transform:rotate(-0.5deg)} }
    @keyframes sway6 { 0%,100%{transform:rotate(0deg)} 40%{transform:rotate(-1.8deg)} 80%{transform:rotate(0.4deg)} }
    .cloud { position: absolute; z-index: 2; pointer-events: none; }
    .c1 { animation: drift1 50s linear infinite; }
    .c2 { animation: drift2 60s linear infinite; }
    .c3 { animation: drift3 65s linear infinite; }
    @keyframes drift1 { 0%{transform:translateX(0)} 100%{transform:translateX(110vw)} }
    @keyframes drift2 { 0%{transform:translateX(0)} 100%{transform:translateX(108vw)} }
    @keyframes drift3 { 0%{transform:translateX(0)} 100%{transform:translateX(112vw)} }
    .bird { position: absolute; z-index: 3; pointer-events: none; }
    .b1 { animation: bf1 22s linear infinite; }
    .b2 { animation: bf2 28s linear infinite; }
    .b3 { animation: bf3 25s linear infinite; }
    @keyframes bf1 { 0%{transform:translate(0,0)} 50%{transform:translate(50vw,-12px)} 100%{transform:translate(105vw,5px)} }
    @keyframes bf2 { 0%{transform:translate(0,0)} 40%{transform:translate(42vw,8px)} 100%{transform:translate(105vw,-6px)} }
    @keyframes bf3 { 0%{transform:translate(0,0)} 60%{transform:translate(58vw,-10px)} 100%{transform:translate(105vw,3px)} }
    #root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
  </style>
  <script>
    window.storage = {
      async get(key) { const v = localStorage.getItem(key); if (v === null) throw new Error('Key not found'); return { key, value: v, shared: false }; },
      async set(key, value) { localStorage.setItem(key, value); return { key, value, shared: false }; },
      async delete(key) { localStorage.removeItem(key); return { key, deleted: true, shared: false }; },
      async list(prefix) { const keys = []; for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (!prefix || k.startsWith(prefix)) keys.push(k); } return { keys, shared: false }; }
    };
  </script>
</head>

<div id="root"></div>

<script>
// ============================================================
//  BEACH RENDERING ENGINE (runs outside React)
// ============================================================
function seededRng(s){return()=>{s=(s*9301+49297)%233280;return s/233280}}
function bPt(a,b,c,d,t){const u=1-t;return{x:u*u*u*a.x+3*u*u*t*b.x+3*u*t*t*c.x+t*t*t*d.x,y:u*u*u*a.y+3*u*u*t*b.y+3*u*t*t*c.y+t*t*t*d.y}}
function bTn(a,b,c,d,t){const u=1-t;const dx=3*u*u*(b.x-a.x)+6*u*t*(c.x-b.x)+3*t*t*(d.x-c.x);const dy=3*u*u*(b.y-a.y)+6*u*t*(c.y-b.y)+3*t*t*(d.y-c.y);const l=Math.sqrt(dx*dx+dy*dy)||1;return{x:dx/l,y:dy/l}}

function renderFeatherFrond(cfg){const{width=500,height=400,stemPoints,leaflets=20,maxLeafLen=90,minLeafLen=18,maxLeafWidth=12,minLeafWidth=4,leafCurve=0.3,stemWidth=5,seed=42}=cfg;const rand=seededRng(seed);const c=document.createElement('canvas');c.width=width*2;c.height=height*2;const ctx=c.getContext('2d');ctx.scale(2,2);const[p0,p1,p2,p3]=stemPoints;ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.bezierCurveTo(p1.x,p1.y,p2.x,p2.y,p3.x,p3.y);ctx.strokeStyle='#2A6820';ctx.lineWidth=stemWidth;ctx.lineCap='round';ctx.stroke();ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.bezierCurveTo(p1.x,p1.y,p2.x,p2.y,p3.x,p3.y);ctx.strokeStyle='#3A7830';ctx.lineWidth=stemWidth*0.45;ctx.stroke();for(let i=0;i<leaflets;i++){const t=(i+0.5)/leaflets;const pt=bPt(p0,p1,p2,p3,t);const tan=bTn(p0,p1,p2,p3,t);const pL={x:-tan.y,y:tan.x};const pR={x:tan.y,y:-tan.x};const taper=Math.sin(t*Math.PI)*0.8+0.2;const baseLen=minLeafLen+(maxLeafLen-minLeafLen)*taper;const baseWid=minLeafWidth+(maxLeafWidth-minLeafWidth)*taper;for(let side=-1;side<=1;side+=2){const perp=side<0?pL:pR;const v=0.82+rand()*0.36;const len=baseLen*v;const w=baseWid*(0.8+rand()*0.4);const ang=(rand()-0.5)*0.12;const tipX=pt.x+perp.x*len+tan.x*len*leafCurve;const tipY=pt.y+perp.y*len+tan.y*len*leafCurve;const midT=0.4;const midX=pt.x+perp.x*len*midT+tan.x*len*leafCurve*midT*0.5;const midY=pt.y+perp.y*len*midT+tan.y*len*leafCurve*midT*0.5;const ldx=tipX-pt.x,ldy=tipY-pt.y;const ll=Math.sqrt(ldx*ldx+ldy*ldy)||1;const lnx=-ldy/ll,lny=ldx/ll;const colors=['#3A8030','#408830','#358028','#3A7830','#449038','#388030'];ctx.fillStyle=colors[Math.floor(rand()*colors.length)];ctx.globalAlpha=0.85+rand()*0.15;ctx.beginPath();ctx.moveTo(pt.x,pt.y);ctx.quadraticCurveTo(midX+lnx*w*0.5+ang*side*8,midY+lny*w*0.5,tipX,tipY);ctx.quadraticCurveTo(midX-lnx*w*0.5+ang*side*8,midY-lny*w*0.5,pt.x,pt.y);ctx.fill();ctx.globalAlpha=0.4;ctx.beginPath();ctx.moveTo(pt.x,pt.y);ctx.quadraticCurveTo(midX+ang*side*4,midY,tipX,tipY);ctx.strokeStyle='#2A6020';ctx.lineWidth=Math.max(0.4,1.2-t*0.8);ctx.stroke();ctx.globalAlpha=1}}const img=document.createElement('img');img.src=c.toDataURL();img.style.width=width+'px';img.style.height=height+'px';return img}

function renderFanFrond(cfg){const{width=400,height=400,originX=200,originY=380,blades=16,bladeLen=280,bladeWidth=14,spreadAngle=Math.PI*0.65,startAngle=-Math.PI/2,seed=42}=cfg;const rand=seededRng(seed);const c=document.createElement('canvas');c.width=width*2;c.height=height*2;const ctx=c.getContext('2d');ctx.scale(2,2);ctx.beginPath();ctx.moveTo(originX,originY);ctx.lineTo(originX,originY-20);ctx.strokeStyle='#3A7830';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();for(let i=0;i<blades;i++){const frac=i/(blades-1);const angle=startAngle-spreadAngle/2+spreadAngle*frac;const lenVar=0.75+rand()*0.25;const len=bladeLen*lenVar;const wVar=0.7+rand()*0.6;const w=bladeWidth*wVar;const curveAmt=(rand()-0.5)*0.08;const cosA=Math.cos(angle+curveAmt);const sinA=Math.sin(angle+curveAmt);const tipX=originX+cosA*len;const tipY=originY+sinA*len;const pnx=-sinA,pny=cosA;const midF=0.45;const midX=originX+cosA*len*midF;const midY=originY+sinA*len*midF;const colors=['#3A8030','#408830','#358028','#3A7830','#449038','#2E7028'];ctx.fillStyle=colors[Math.floor(rand()*colors.length)];ctx.globalAlpha=0.8+rand()*0.2;ctx.beginPath();ctx.moveTo(originX,originY-15);ctx.quadraticCurveTo(midX+pnx*w,midY+pny*w,tipX,tipY);ctx.quadraticCurveTo(midX-pnx*w,midY-pny*w,originX,originY-15);ctx.fill();ctx.globalAlpha=0.35;ctx.beginPath();ctx.moveTo(originX,originY-15);ctx.lineTo(tipX,tipY);ctx.strokeStyle='#2A6020';ctx.lineWidth=Math.max(0.4,1-frac*0.3);ctx.stroke();ctx.globalAlpha=1}const img=document.createElement('img');img.src=c.toDataURL();img.style.width=width+'px';img.style.height=height+'px';return img}

// ============================================================
//  5-phase color palette
// ============================================================
function getBeachColors() {
  const h = new Date().getHours();
  if (h < 6) return { // late night
    skyTop:'#0A1018', skyMid:'#101E28', skyBot:'#182830',
    ocean1:'rgba(20,40,50,0.8)', ocean2:'rgba(15,30,40,0.85)',
    wetSand:'#22201A', sand:'#1A1810', foam:'rgba(180,220,255,0.12)',
    shimmer:'rgba(180,220,255,0.06)', isNight:true, sunX:0.85, sunY:0.12, sunR:22, sunColor:'rgba(235,240,230,0.75)', sunGlow:'rgba(235,240,230,0.3)',
  };
  if (h < 9) return { // early morning - golden dawn
    skyTop:'#E8A878', skyMid:'#F0C8A0', skyBot:'#F8E0C0',
    ocean1:'rgba(120,152,168,0.6)', ocean2:'rgba(100,140,156,0.65)',
    wetSand:'#C8B898', sand:'#E8D8C0', foam:'rgba(255,220,180,0.45)',
    shimmer:'rgba(255,220,180,0.2)', isNight:false, sunX:0.15, sunY:0.2, sunR:30, sunColor:'rgba(255,216,160,0.6)', sunGlow:'rgba(255,232,192,0.4)',
  };
  if (h < 12) return { // morning - M4 peach-into-blue
    skyTop:'#D8B8A8', skyMid:'#C0C8CC', skyBot:'#A8D0D8',
    ocean1:'rgba(72,160,176,0.65)', ocean2:'rgba(56,140,156,0.7)',
    wetSand:'#CCC0A8', sand:'#E8D8C0', foam:'rgba(255,255,255,0.5)',
    shimmer:'rgba(255,255,255,0.2)', isNight:false, sunX:0.75, sunY:0.14, sunR:28, sunColor:'rgba(255,232,200,0.55)', sunGlow:'rgba(255,244,224,0.35)',
  };
  if (h < 17) return { // afternoon - D high noon bright
    skyTop:'#A8D8E8', skyMid:'#C0E0E8', skyBot:'#D8E8E8',
    ocean1:'rgba(56,168,184,0.7)', ocean2:'rgba(48,150,168,0.72)',
    wetSand:'#D8CCA8', sand:'#F8F0DA', foam:'rgba(255,255,255,0.55)',
    shimmer:'rgba(255,255,255,0.3)', isNight:false, sunX:0.5, sunY:0.08, sunR:32, sunColor:'rgba(255,248,224,0.5)', sunGlow:'rgba(255,255,240,0.35)',
  };
  if (h < 21) return { // evening - coral sunset
    skyTop:'#C07080', skyMid:'#D89890', skyBot:'#E8B8A8',
    ocean1:'rgba(80,104,120,0.85)', ocean2:'rgba(65,90,105,0.88)',
    wetSand:'#A89880', sand:'#D0BEA8', foam:'rgba(255,180,160,0.3)',
    shimmer:'rgba(255,180,160,0.15)', isNight:false, sunX:0.5, sunY:0.22, sunR:34, sunColor:'rgba(255,144,120,0.4)', sunGlow:'rgba(255,184,160,0.3)',
  };
  return { // late night
    skyTop:'#0A1018', skyMid:'#101E28', skyBot:'#182830',
    ocean1:'rgba(20,40,50,0.8)', ocean2:'rgba(15,30,40,0.85)',
    wetSand:'#22201A', sand:'#1A1810', foam:'rgba(180,220,255,0.12)',
    shimmer:'rgba(180,220,255,0.06)', isNight:true, sunX:0.85, sunY:0.12, sunR:22, sunColor:'rgba(235,240,230,0.75)', sunGlow:'rgba(235,240,230,0.3)',
  };
}

// ============================================================
//  Draw beach background to canvas
// ============================================================
function drawBeach() {
  const cv = document.getElementById('beach-canvas');
  const W = cv.width = window.innerWidth, H = cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');
  const p = getBeachColors();

  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,H*0.65);
  sky.addColorStop(0,p.skyTop); sky.addColorStop(0.4,p.skyMid); sky.addColorStop(1,p.skyBot);
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  // Sun/Moon
  ctx.beginPath(); ctx.arc(W*p.sunX, H*p.sunY, p.sunR, 0, Math.PI*2);
  ctx.fillStyle = p.sunColor; ctx.fill();
  ctx.beginPath(); ctx.arc(W*p.sunX, H*p.sunY, p.sunR*0.65, 0, Math.PI*2);
  ctx.fillStyle = p.sunGlow; ctx.fill();

  // Night stars
  if (p.isNight) {
    const sr = seededRng(777);
    for (let i=0; i<60; i++) {
      ctx.beginPath();
      ctx.arc(sr()*W, sr()*H*0.5, sr()*1.5+0.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,240,${sr()*0.4+0.2})`;
      ctx.fill();
    }
  }

  // Ocean
  const oy = H*0.55;
  ctx.beginPath(); ctx.moveTo(0,oy);
  for(let x=0;x<=W;x+=12) ctx.lineTo(x, oy+Math.sin(x*0.008)*10-5);
  ctx.lineTo(W,H*0.7); ctx.lineTo(0,H*0.7); ctx.closePath();
  const og=ctx.createLinearGradient(0,oy,0,H*0.7);
  og.addColorStop(0,p.ocean1); og.addColorStop(1,p.ocean2);
  ctx.fillStyle=og; ctx.fill();

  // Shimmer
  ctx.beginPath();
  for(let x=0;x<=W;x+=10){const y=oy+22+Math.sin(x*0.01+1)*6;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
  ctx.strokeStyle=p.shimmer; ctx.lineWidth=1; ctx.stroke();

  // Wet sand
  ctx.fillStyle=p.wetSand; ctx.fillRect(0,H*0.67,W,H*0.05);

  // Foam
  ctx.beginPath(); ctx.moveTo(0,H*0.685);
  for(let x=0;x<=W;x+=8) ctx.lineTo(x,H*0.685+Math.sin(x*0.012)*4);
  ctx.strokeStyle=p.foam; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke();

  // Sand
  ctx.fillStyle=p.sand; ctx.fillRect(0,H*0.71,W,H*0.3);

  // Sand dots
  const dr=seededRng(888);
  for(let i=0;i<25;i++){ctx.beginPath();ctx.arc(dr()*W,H*0.71+dr()*(H*0.29),dr()*1.5+0.5,0,Math.PI*2);ctx.fillStyle=p.isNight?'rgba(40,35,25,0.3)':'rgba(200,185,155,0.3)';ctx.fill()}

  // Crabs
  function crab(x,y,sz,col){
    ctx.save();ctx.translate(x,y);
    ctx.beginPath();ctx.ellipse(0,0,sz,sz*0.65,0,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=sz*0.12;ctx.lineCap='round';ctx.lineJoin='round';
    for(let s=-1;s<=1;s+=2){for(let i=0;i<3;i++){const by=(i-1)*sz*0.3;ctx.beginPath();ctx.moveTo(s*sz*0.7,by);ctx.lineTo(s*sz*1.5,by+sz*0.25);ctx.lineTo(s*sz*1.8,by+sz*0.05);ctx.stroke()}
    ctx.lineWidth=sz*0.15;ctx.beginPath();ctx.moveTo(s*sz*0.5,-sz*0.5);ctx.lineTo(s*sz*1.0,-sz*0.9);ctx.lineTo(s*sz*1.3,-sz*0.6);ctx.stroke();ctx.beginPath();ctx.moveTo(s*sz*1.0,-sz*0.9);ctx.lineTo(s*sz*0.85,-sz*0.65);ctx.stroke();
    ctx.lineWidth=sz*0.08;ctx.beginPath();ctx.moveTo(s*sz*0.25,-sz*0.55);ctx.lineTo(s*sz*0.3,-sz*0.85);ctx.stroke();ctx.beginPath();ctx.arc(s*sz*0.3,-sz*0.88,sz*0.13,0,Math.PI*2);ctx.fillStyle='#1A1510';ctx.fill()}
    ctx.restore();
  }
  crab(W*0.22,H*0.82,8,p.isNight?'#604838':'#C07850');
  crab(W*0.72,H*0.87,7,p.isNight?'#584030':'#B87048');
  crab(W*0.48,H*0.79,5.5,p.isNight?'#644840':'#C88058');
}

// ============================================================
//  Frond layout (Canopy C minus center droop)
// ============================================================
function setupFronds() {
  const W=window.innerWidth, H=window.innerHeight;
  const container=document.getElementById('frond-container');
  container.innerHTML='';
  const fronds = [
    // Left main feather
    {type:'feather',width:W*0.6,height:H*0.48,stemPoints:[{x:0,y:0},{x:W*0.1,y:H*0.08},{x:W*0.26,y:H*0.2},{x:W*0.44,y:H*0.35}],leaflets:26,maxLeafLen:W*0.07,minLeafLen:14,maxLeafWidth:W*0.014,minLeafWidth:4,stemWidth:5.5,seed:701,posX:-W*0.14,posY:-H*0.15,origin:'0% 0%',sway:'sway1'},
    // Right main feather
    {type:'feather',width:W*0.6,height:H*0.48,stemPoints:[{x:W*0.6,y:0},{x:W*0.5,y:H*0.08},{x:W*0.34,y:H*0.2},{x:W*0.16,y:H*0.35}],leaflets:26,maxLeafLen:W*0.07,minLeafLen:14,maxLeafWidth:W*0.014,minLeafWidth:4,stemWidth:5.5,seed:702,posX:W*0.48,posY:-H*0.15,origin:'100% 0%',sway:'sway2'},
    // Left fan
    {type:'fan',width:W*0.65,height:W*0.65,originX:W*0.1,originY:W*0.1,blades:16,bladeLen:W*0.42,bladeWidth:W*0.013,spreadAngle:Math.PI*0.55,startAngle:Math.PI*0.25,seed:703,posX:-W*0.14,posY:-W*0.14,origin:'0% 0%',sway:'sway4',opacity:0.55},
    // Right fan
    {type:'fan',width:W*0.65,height:W*0.65,originX:W*0.55,originY:W*0.1,blades:16,bladeLen:W*0.42,bladeWidth:W*0.013,spreadAngle:Math.PI*0.55,startAngle:Math.PI*0.75,seed:704,posX:W*0.52,posY:-W*0.14,origin:'100% 0%',sway:'sway6',opacity:0.55},
    // Left secondary feather (lower)
    {type:'feather',width:W*0.45,height:H*0.25,stemPoints:[{x:0,y:0},{x:W*0.08,y:H*0.04},{x:W*0.18,y:H*0.08},{x:W*0.32,y:H*0.1}],leaflets:16,maxLeafLen:W*0.04,minLeafLen:8,maxLeafWidth:W*0.008,minLeafWidth:3,stemWidth:3.5,seed:705,posX:-W*0.12,posY:-H*0.02,origin:'0% 0%',sway:'sway3',opacity:0.5},
  ];
  fronds.forEach(f=>{
    let img;
    if(f.type==='fan') img=renderFanFrond(f); else img=renderFeatherFrond(f);
    img.className='frond-img '+(f.sway||'sway1');
    img.style.left=f.posX+'px'; img.style.top=(f.posY||0)+'px';
    img.style.transformOrigin=f.origin||'0% 0%';
    if(f.opacity) img.style.opacity=f.opacity;
    container.appendChild(img);
  });
}

// ============================================================
//  Color + time system
// ============================================================
function getTimeOfDay() {
  const h = new Date().getHours();
  if (h < 6) return "lateNight";
  if (h < 9) return "earlyMorning";
  if (h < 12) return "morning";
  if (h < 17) return "afternoon";
  if (h < 21) return "evening";
  return "lateNight";
}
function isNightTime() { const h = new Date().getHours(); return h < 6 || h >= 21; }
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

//  Speech bubble
// ============================================================
function SpeechBubble({ text, visible, isWellness }) {
  const night = isNightTime();
  return (
    <div className="absolute left-1/2 transition-all duration-500 pointer-events-none select-none"
      style={{
        bottom: "100%", marginBottom: "10px", transform: "translateX(-50%)",
        opacity: visible ? 1 : 0, scale: visible ? "1" : "0.8", width: "max-content",
      }}>
      <div className="relative px-4 py-2 rounded-2xl text-center" style={{
        maxWidth: 560, width: "max-content", whiteSpace: "normal", lineHeight: 1.4,
        background: isWellness ? "rgba(100, 210, 170, 0.18)" : night ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.88)",
        backdropFilter: "blur(12px)",
        border: isWellness ? "1px solid rgba(100, 210, 170, 0.35)" : night ? "1px solid rgba(255,255,255,0.15)" : "1px solid rgba(0,0,0,0.08)",
        color: isWellness ? (night ? "#A0E0C8" : "#2A5A4A") : night ? "rgba(255,255,255,0.9)" : "#2c2c2a",
        fontFamily: "'Courier New', monospace", fontSize: "13px", letterSpacing: "0.3px",
      }}>
        {isWellness && <span style={{ marginRight: 4, fontSize: 11, opacity: 0.7 }}>~</span>}
        {text}
        <div className="absolute left-1/2 -bottom-1.5" style={{
          transform: "translateX(-50%) rotate(45deg)", width: 8, height: 8,
          background: isWellness ? "rgba(100, 210, 170, 0.18)" : night ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.88)",
          border: isWellness ? "1px solid rgba(100, 210, 170, 0.35)" : night ? "1px solid rgba(255,255,255,0.15)" : "1px solid rgba(0,0,0,0.08)",
          borderTop: "none", borderLeft: "none",
        }} />
      </div>
    </div>
  );
}

}

// ============================================================
//  Persistent Reminder
// ============================================================
function PersistentReminder({ text, type, onDismiss }) {
  const night = isNightTime();
  const colors = { move: ["rgba(255,180,100,0.18)","rgba(255,180,100,0.35)"], eyes: ["rgba(130,180,255,0.18)","rgba(130,180,255,0.35)"], water: ["rgba(100,200,220,0.18)","rgba(100,200,220,0.35)"] };
  const [bg, border] = colors[type] || colors.move;
  return (
    <div className="flex items-center gap-3 px-5 py-3 rounded-2xl" style={{
      background: bg, border: `1px solid ${border}`, backdropFilter: "blur(10px)",
      fontFamily: "'Courier New', monospace", fontSize: "13px", color: night ? "rgba(255,255,255,0.9)" : "#2c2c2a",
      animation: "reminderPulse 3s ease-in-out infinite", maxWidth: 560,
    }}>
      <div className="flex-1" style={{ lineHeight: 1.4 }}>{text}</div>
      <button onClick={onDismiss} className="flex-shrink-0 px-3 py-1 rounded-xl cursor-pointer" style={{
        background: night ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.06)", border: night ? "1px solid rgba(255,255,255,0.2)" : "1px solid rgba(0,0,0,0.1)",
        color: night ? "rgba(255,255,255,0.9)" : "#2c2c2a", fontFamily: "'Courier New', monospace", fontSize: "12px", transition: "all 0.2s ease",
      }}>done!</button>
    </div>
  );
}

// ============================================================
//  Main App
// ============================================================
function DesktopPet() {
  const [message, setMessage] = useState("");
  const [showBubble, setShowBubble] = useState(false);
  const [isWellness, setIsWellness] = useState(false);
  const [isHappy, setIsHappy] = useState(false);
  const [squeezed, setSqueezed] = useState(false);
  const [mood, setMood] = useState(getTimeOfDay);
  const [clickCount, setClickCount] = useState(0);
  const [moveReminder, setMoveReminder] = useState(null);
  const [eyesReminder, setEyesReminder] = useState(null);
  const [waterReminder, setWaterReminder] = useState(null);
  const [isPuffed, setIsPuffed] = useState(false);
  const [isPurring, setIsPurring] = useState(false);
  const [specialAnim, setSpecialAnim] = useState(null);
  const [wingTwitchSide, setWingTwitchSide] = useState(null);
  const [pupilOffset, setPupilOffset] = useState({ x: 0, y: 0 });
  const [chasedBugId, setChasedBugId] = useState(null);
  const [currentMsgType, setCurrentMsgType] = useState(null);
  const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
  const [isDragging, setIsDragging] = useState(false);
  const [isReturning, setIsReturning] = useState(false);
  const [isWandering, setIsWandering] = useState(false);
  const [isShaken, setIsShaken] = useState(false);
  const [isBlinking, setIsBlinking] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [wellnessInterval, setWellnessInterval] = useState(20);
  const [moveInterval, setMoveInterval] = useState(45);
  const [eyesInterval, setEyesInterval] = useState(20);
  const [waterInterval, setWaterInterval] = useState(30);
  const [showJournal, setShowJournal] = useState(false);
  const [journalView, setJournalView] = useState("write");
  const [journalText, setJournalText] = useState("");
  const [journalPrompt, setJournalPrompt] = useState(() => pickRandom(JOURNAL_PROMPTS));
  const [journalEntries, setJournalEntries] = useState([]);
  const [journalLoading, setJournalLoading] = useState(true);

  const dragStartRef = useRef(null);
  const wanderTimerRef = useRef(null);
  const wanderDriftRef = useRef(null);
  const justDraggedRef = useRef(false);
  const dragVelocityRef = useRef([]);
  const shakeTimerRef = useRef(null);
  const bubbleTimer = useRef(null);
  const idleTimer = useRef(null);
  const wellnessTimer = useRef(null);
  const happyTimer = useRef(null);
  const moveTimer = useRef(null);
  const eyesTimer = useRef(null);
  const waterTimer = useRef(null);
  const lastWellnessRef = useRef("");
  const lastEncRef = useRef("");
  const clickTimesRef = useRef([]);
  const lastInteractionRef = useRef(Date.now());
  const holdTimerRef = useRef(null);
  const creatureRef = useRef(null);
  const puffTimerRef = useRef(null);
  const specialTimerRef = useRef(null);

  // Time updates + beach refresh
  useEffect(() => {
    const iv = setInterval(() => { setMood(getTimeOfDay()); }, 60000);
    return () => clearInterval(iv);
  }, []);

  // Load journal
  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get("tater-journal"); if (r?.value) setJournalEntries(JSON.parse(r.value)); } catch(e) {}
      setJournalLoading(false);
    })();
  }, []);

  // Load/save pokes
  useEffect(() => { (async () => { try { const r = await window.storage.get("tater-pokes"); if (r?.value) setClickCount(parseInt(r.value,10)||0); } catch(e) {} })(); }, []);
  useEffect(() => { if (clickCount>0) window.storage.set("tater-pokes", String(clickCount)).catch(()=>{}); }, [clickCount]);

  // Eye tracking
  const handleMouseMove = useCallback((e) => {
    if (!creatureRef.current || specialAnim === "sleep") return;
    const rect = creatureRef.current.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height * 0.35;
    const dx = e.clientX - cx, dy = e.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy), norm = Math.min(dist / 300, 1);
    setPupilOffset({ x: (dx/(dist||1))*norm, y: (dy/(dist||1))*norm });
  }, [specialAnim]);
  useEffect(() => { window.addEventListener("mousemove", handleMouseMove); return () => window.removeEventListener("mousemove", handleMouseMove); }, [handleMouseMove]);

  // Blink
  useEffect(() => { const s = () => { setTimeout(() => { if (specialAnim !== "sleep" && !isPurring) { setIsBlinking(true); setTimeout(() => setIsBlinking(false), 250); } s(); }, Math.random()*25000+15000); }; s(); }, [specialAnim, isPurring]);

  // Wing twitches
  useEffect(() => { const s = () => { setTimeout(() => { setWingTwitchSide(Math.random()>0.5?"left":"right"); setTimeout(() => setWingTwitchSide(null), 350); s(); }, Math.random()*12000+6000); }; s(); }, []);

  // Idle wandering
  useEffect(() => {
    const s = () => { wanderTimerRef.current = setTimeout(() => {
      if (!isDragging && !isReturning && !specialAnim) {
        setIsWandering(true); setDragPos({ x: (Math.random()-0.5)*40, y: (Math.random()-0.5)*25 });
        wanderDriftRef.current = setTimeout(() => { setDragPos({x:0,y:0}); wanderDriftRef.current = setTimeout(() => setIsWandering(false), 3000); }, 2500);
      } s();
    }, Math.random()*20000+15000); };
    s(); return () => clearTimeout(wanderTimerRef.current);
  }, [isDragging, isReturning, specialAnim]);

  // Unprompted behaviors
  useEffect(() => {
    const s = () => { specialTimerRef.current = setTimeout(() => {
      const idle = Date.now() - lastInteractionRef.current;
      if (Math.random() < 0.03) { setSpecialAnim("secret"); setTimeout(() => setSpecialAnim(null), 2200); s(); return; }
      if (idle > 180000 && Math.random() < 0.4) { setSpecialAnim("sleep"); s(); return; }
      if (Math.random() < 0.2) { setSpecialAnim("flyAttempt"); setTimeout(() => { setSpecialAnim(null); showMsg(pickRandom(MESSAGES.flyFail)); }, 1600); s(); return; }
      if (Math.random() < 0.25) {
        setChasedBugId(Math.floor(Math.random()*4)); setSpecialAnim("chaseBug");
        showMsg(pickRandom(["*eyes lock onto crab*","...i see you, little guy.","TARGET ACQUIRED","*emu pupils dilate*","don't move don't move don't move","*predator mode activated*","bwak... bwak..."]));
        setTimeout(() => { setChasedBugId(null); setSpecialAnim(null);
          showMsg(Math.random()>0.5 ? pickRandom(["*got it!!* wait no it escaped.","*CRUNCH* ...sandy but delicious.","hehe gotcha little crab","*triumphant wing nub flap*","too slow, little bug!","i'm a predator. a tiny naked predator."])
          : pickRandom(["...it got away. coward.","*dejected bwak*","next time.","i wasn't even trying. (i was.)","that crab is too fast.","what if they have a family."]));
        }, 3000); s(); return;
      }
      if (Math.random() < 0.3) { showMsg(pickRandom(DISCOVERIES)); s(); return; }
      s();
    }, Math.random()*120000+90000); };
    s(); return () => clearTimeout(specialTimerRef.current);
  }, []);

  const showMsg = useCallback((text, wellness=false, msgType=null) => {
    if (bubbleTimer.current) clearTimeout(bubbleTimer.current);
    setMessage(text); setShowBubble(true); setIsWellness(wellness); setCurrentMsgType(msgType);
  }, []);

  const triggerHappy = useCallback(() => {
    if (happyTimer.current) clearTimeout(happyTimer.current);
    setIsHappy(true); happyTimer.current = setTimeout(() => setIsHappy(false), 2000);
  }, []);

  const pickUnique = useCallback((pool, ref) => {
    let p = pickRandom(pool), a=0;
    while (p === ref.current && a < 5) { p = pickRandom(pool); a++; }
    ref.current = p; return p;
  }, []);

  // Journal
  const saveJournal = useCallback(async (text) => {
    const entry = { id: Date.now(), text: text.trim(), prompt: journalPrompt, date: new Date().toISOString() };
    const updated = [entry, ...journalEntries];
    setJournalEntries(updated); setJournalText(""); setJournalPrompt(pickRandom(JOURNAL_PROMPTS));
    try { await window.storage.set("tater-journal", JSON.stringify(updated)); } catch(e) {}
    triggerHappy();
    showMsg(pickRandom(["saved! your words matter, Evelyn.","got it. that one's safe with me.","journaled! look at you being reflective.","*tucks your entry away in the sand*","written and stored. future-you will appreciate this.","that was good. do this more often.","entry saved. you're building a record of being alive."]));
  }, [journalEntries, journalPrompt, triggerHappy, showMsg]);

  const deleteJournal = useCallback(async (id) => {
    const u = journalEntries.filter(e => e.id !== id); setJournalEntries(u);
    try { await window.storage.set("tater-journal", JSON.stringify(u)); } catch(e) {}
  }, [journalEntries]);

  // Timers
  useEffect(() => { if (wellnessTimer.current) clearTimeout(wellnessTimer.current);
    const ms = wellnessInterval*60000, j = ms*0.3;
    const s = () => { wellnessTimer.current = setTimeout(() => { showMsg(pickUnique(WELLNESS, lastWellnessRef), true, "wellness"); s(); }, ms + Math.random()*j); }; s();
    return () => clearTimeout(wellnessTimer.current);
  }, [showMsg, pickUnique, wellnessInterval]);

  useEffect(() => { if (moveTimer.current) clearTimeout(moveTimer.current);
    moveTimer.current = setTimeout(() => setMoveReminder(pickRandom(MOVE_REMINDERS)), moveInterval*60000);
    return () => clearTimeout(moveTimer.current);
  }, [moveInterval]);
  const dismissMove = useCallback(() => { setMoveReminder(null); triggerHappy(); showMsg(pickRandom(MOVE_DONE));
    moveTimer.current = setTimeout(() => setMoveReminder(pickRandom(MOVE_REMINDERS)), moveInterval*60000);
  }, [showMsg, triggerHappy, moveInterval]);

  useEffect(() => { if (eyesTimer.current) clearTimeout(eyesTimer.current);
    eyesTimer.current = setTimeout(() => setEyesReminder(pickRandom(EYES_REMINDERS)), eyesInterval*60000);
    return () => clearTimeout(eyesTimer.current);
  }, [eyesInterval]);
  const dismissEyes = useCallback(() => { setEyesReminder(null); triggerHappy(); showMsg(pickRandom(EYES_DONE));
    eyesTimer.current = setTimeout(() => setEyesReminder(pickRandom(EYES_REMINDERS)), eyesInterval*60000);
  }, [showMsg, triggerHappy, eyesInterval]);

  useEffect(() => { if (waterTimer.current) clearTimeout(waterTimer.current);
    waterTimer.current = setTimeout(() => setWaterReminder(pickRandom(WATER_REMINDERS)), waterInterval*60000);
    return () => clearTimeout(waterTimer.current);
  }, [waterInterval]);
  const dismissWater = useCallback(() => { setWaterReminder(null); triggerHappy(); showMsg(pickRandom(WATER_DONE));
    waterTimer.current = setTimeout(() => setWaterReminder(pickRandom(WATER_REMINDERS)), waterInterval*60000);
  }, [showMsg, triggerHappy, waterInterval]);

  // Idle chatter
  useEffect(() => {
    const s = () => { idleTimer.current = setTimeout(() => {
      if (specialAnim === "sleep") { s(); return; }
      const r = Math.random();
      if (r < 0.16) { triggerHappy(); showMsg(pickUnique(ENCOURAGEMENT, lastEncRef), false, "encouragement"); }
      else if (r < 0.32) showMsg(pickRandom(MINDFULNESS), false, "mindfulness");
      else if (r < 0.37) showMsg(pickRandom(JOURNAL_NUDGES), false, "journal");
      else if (r < 0.45) showMsg(pickRandom(SCIENCE_FACTS), false, "science");
      else if (r < 0.65) showMsg(pickRandom(MESSAGES.idle), false, "idle");
      else showMsg(pickRandom(MESSAGES[mood]), false, "time");
      s();
    }, Math.random()*25000+15000); };
    s(); return () => clearTimeout(idleTimer.current);
  }, [mood, showMsg, triggerHappy, pickUnique, specialAnim]);

  // Greeting
  useEffect(() => { const t = setTimeout(() => showMsg(pickRandom(MESSAGES[mood])), 1500); return () => clearTimeout(t); }, []);

  // Click
  const handleClick = (e) => {
    if (e.detail > 1 || justDraggedRef.current || isPurring) return;
    lastInteractionRef.current = Date.now();
    if (specialAnim === "sleep") { setSpecialAnim(null); setIsPuffed(true); showMsg(pickRandom(MESSAGES.startled));
      if (puffTimerRef.current) clearTimeout(puffTimerRef.current); puffTimerRef.current = setTimeout(() => setIsPuffed(false), 1500); return; }
    setSqueezed(true); setClickCount(c => c+1); setTimeout(() => setSqueezed(false), 280);
    const now = Date.now(); clickTimesRef.current.push(now); clickTimesRef.current = clickTimesRef.current.filter(t => now-t < 2000);
    const since = now - (clickTimesRef.current[clickTimesRef.current.length-2]||0);
    if (clickTimesRef.current.length === 1 && since > 180000 && Math.random() < 0.5) {
      setIsPuffed(true); showMsg(pickRandom(MESSAGES.startled));
      if (puffTimerRef.current) clearTimeout(puffTimerRef.current); puffTimerRef.current = setTimeout(() => setIsPuffed(false), 1500); return; }
    if (clickTimesRef.current.length >= 4) { showMsg(pickRandom(MESSAGES.rapidClick)); return; }
    if (currentMsgType === "mindfulness") { showMsg(pickRandom(MESSAGES.mindfulClick)); return; }
    const r = Math.random();
    if (r < 0.15) { triggerHappy(); showMsg(pickUnique(ENCOURAGEMENT, lastEncRef), false, "encouragement"); }
    else if (r < 0.25) showMsg(pickRandom(MESSAGES[mood]));
    else showMsg(pickRandom(MESSAGES.clicked));
  };

  const handleDoubleClick = () => {
    if (justDraggedRef.current || specialAnim) return;
    lastInteractionRef.current = Date.now();
    setSpecialAnim("flyAttempt");
    setTimeout(() => { setSpecialAnim(null); showMsg(pickRandom(MESSAGES.flyFail)); }, 1600);
  };

  // Drag, purr, shake
  const handleMouseDown = (e) => {
    e.preventDefault(); lastInteractionRef.current = Date.now();
    dragStartRef.current = { x: e.clientX, y: e.clientY, moved: false };
    holdTimerRef.current = setTimeout(() => {
      if (dragStartRef.current && !dragStartRef.current.moved) { setIsPurring(true); showMsg(pickRandom(MESSAGES.purr)); }
    }, 500);
  };

  useEffect(() => {
    const onMove = (e) => {
      if (!dragStartRef.current) return;
      const dx = e.clientX - dragStartRef.current.x, dy = e.clientY - dragStartRef.current.y;
      if (!dragStartRef.current.moved && Math.sqrt(dx*dx+dy*dy) > 10) {
        dragStartRef.current.moved = true; setIsDragging(true); setIsWandering(false);
        clearTimeout(wanderDriftRef.current); setIsPurring(false); clearTimeout(holdTimerRef.current);
      }
      if (dragStartRef.current.moved) {
        setDragPos({ x: dx, y: dy });
        const now = Date.now();
        dragVelocityRef.current.push({ x: e.clientX, y: e.clientY, t: now });
        dragVelocityRef.current = dragVelocityRef.current.filter(p => now-p.t < 500);
        if (dragVelocityRef.current.length >= 4) {
          let dc = 0;
          for (let i=2; i<dragVelocityRef.current.length; i++) {
            const pd = dragVelocityRef.current[i-1].x - dragVelocityRef.current[i-2].x;
            const cd = dragVelocityRef.current[i].x - dragVelocityRef.current[i-1].x;
            if ((pd>0&&cd<0)||(pd<0&&cd>0)) dc++;
          }
          if (dc >= 3 && !isShaken) {
            setIsShaken(true); showMsg(pickRandom(MESSAGES.shaken));
            if (shakeTimerRef.current) clearTimeout(shakeTimerRef.current);
            shakeTimerRef.current = setTimeout(() => setIsShaken(false), 2000);
            dragVelocityRef.current = [];
          }
        }
      }
    };
    const onUp = () => {
      if (!dragStartRef.current) return; clearTimeout(holdTimerRef.current);
      if (dragStartRef.current.moved) {
        setIsDragging(false); setIsReturning(true); justDraggedRef.current = true; dragVelocityRef.current = [];
        setTimeout(() => { justDraggedRef.current = false; }, 300);
        if (Math.random() < 0.6) showMsg(pickRandom(["wheee!","*trots back to center*","okay okay i'm going back","that was fun. do it again.","i can find my way home. probably.","*waddles back contentedly*","you can't get rid of me that easy","weeeee... *thud into sand*","i belong in the middle of this beach"]));
        requestAnimationFrame(() => { requestAnimationFrame(() => { setDragPos({x:0,y:0}); }); });
        setTimeout(() => setIsReturning(false), 3200);
      } else { if (isPurring) setIsPurring(false); }
      dragStartRef.current = null;
    };
    window.addEventListener("mousemove", onMove); window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, [isPurring, isShaken, showMsg]);

  const night = isNightTime();
  const textColor = night ? "rgba(255,255,255,0.8)" : "rgba(44,44,42,0.8)";
  const subtleColor = night ? "rgba(255,255,255,0.35)" : "rgba(44,44,42,0.35)";
  const panelBg = night ? "rgba(0,0,0,0.7)" : "rgba(255,255,255,0.9)";
  const panelBorder = night ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.1)";
  const panelText = night ? "rgba(255,255,255,0.85)" : "rgba(44,44,42,0.9)";
  const btnBg = night ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.05)";
  const btnBorder = night ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.1)";
  const btnText = night ? "rgba(255,255,255,0.4)" : "rgba(44,44,42,0.4)";
  const accent = night ? "#45A0A8" : "#2E8890";
  const accentLight = night ? "rgba(69,160,168,0.2)" : "rgba(46,136,144,0.2)";
  const accentBorder = night ? "rgba(69,160,168,0.35)" : "rgba(46,136,144,0.35)";

  return (
    <div className="relative flex flex-col items-center justify-end w-full overflow-hidden select-none"
      style={{ minHeight: "100vh", fontFamily: "'Courier New', monospace", paddingBottom: "4%" }}>

      <div className="relative" style={{
        zIndex: 10,
        transform: `translate(${dragPos.x}px, ${dragPos.y}px)`,
        transition: isDragging ? "none" : "transform 3s cubic-bezier(0.15, 0.6, 0.35, 1)",
        animation: !isDragging && !isReturning ? (
          specialAnim === "chaseBug" ? "creatureChase 3s ease-in-out"
          : specialAnim === "flyAttempt" ? "creatureFly 1.5s ease-in-out"
          : "none") : "none",
        cursor: isDragging ? "grabbing" : "grab",
      }} ref={creatureRef} onMouseDown={handleMouseDown}>
        <SpeechBubble text={message} visible={showBubble} isWellness={isWellness} />
        <TaterEmu onClick={handleClick} onDoubleClick={handleDoubleClick}
          squeezed={squeezed} mood={mood} isHappy={isHappy} isPuffed={isPuffed}
          isPurring={isPurring} isBlinking={isBlinking} specialAnim={specialAnim}
          wingTwitchSide={wingTwitchSide} pupilOffset={pupilOffset} />
      </div>

      <div className="mt-1 text-center relative" style={{ zIndex: 10 }}>
        <div style={{ color: textColor, fontSize: 14, letterSpacing: "3px", textTransform: "uppercase" }}>tater</div>
        <div style={{ color: subtleColor, fontSize: 10, marginTop: 3, letterSpacing: "1px" }}>
          click to say hi{clickCount > 0 && ` · poked ${clickCount} time${clickCount > 1 ? "s" : ""}`}
        </div>
        <div style={{ display: "flex", gap: 12, marginTop: 8, justifyContent: "center", flexWrap: "wrap" }}>
          {[["just moved", moveTimer, MOVE_REMINDERS, setMoveReminder, moveInterval],
            ["eyes rested", eyesTimer, EYES_REMINDERS, setEyesReminder, eyesInterval],
            ["drank water", waterTimer, WATER_REMINDERS, setWaterReminder, waterInterval]
          ].map(([label, timer, pool, setter, interval]) => (
            <button key={label} onClick={() => {
              clearTimeout(timer.current); setter(null);
              timer.current = setTimeout(() => setter(pickRandom(pool)), interval*60000);
              showMsg(pickRandom(["nice! timer reset.", "got it!", "noted. clock restarted."]));
            }} style={{
              background: "none", border: "none", cursor: "pointer", color: subtleColor, fontSize: 10,
              fontFamily: "'Courier New', monospace", letterSpacing: "0.5px", transition: "color 0.2s ease", padding: "2px 6px",
            }}
              onMouseEnter={(e) => { e.target.style.color = textColor; }}
              onMouseLeave={(e) => { e.target.style.color = subtleColor; }}
            >{label}</button>
          ))}
        </div>
      </div>

      <div className="flex flex-col items-center gap-3 mt-5 relative" style={{ minHeight: 20, zIndex: 10 }}>
        {eyesReminder && <PersistentReminder text={eyesReminder} type="eyes" onDismiss={dismissEyes} />}
        {moveReminder && <PersistentReminder text={moveReminder} type="move" onDismiss={dismissMove} />}
        {waterReminder && <PersistentReminder text={waterReminder} type="water" onDismiss={dismissWater} />}
      </div>

      {/* Settings gear */}
      <button onClick={() => { setShowSettings(!showSettings); setShowJournal(false); }}
        className="absolute cursor-pointer" style={{
          top: 16, right: 16, zIndex: 50, width: 32, height: 32,
          background: btnBg, border: `1px solid ${btnBorder}`, borderRadius: 8,
          display: "flex", alignItems: "center", justifyContent: "center",
          color: btnText, fontSize: 16, transition: "all 0.2s ease",
        }}>&#9881;</button>

      {showSettings && (
        <div className="absolute" style={{
          top: 56, right: 16, zIndex: 50, padding: "16px 20px", borderRadius: 16,
          background: panelBg, backdropFilter: "blur(15px)", border: `1px solid ${panelBorder}`,
          fontFamily: "'Courier New', monospace", color: panelText, fontSize: 12, minWidth: 240,
        }}>
          <div style={{ marginBottom: 14, fontSize: 13, letterSpacing: "1px", opacity: 0.6 }}>settings</div>
          {[["wellness reminders", wellnessInterval, setWellnessInterval, 10, 60],
            ["move reminders", moveInterval, setMoveInterval, 15, 90],
            ["eye break reminders", eyesInterval, setEyesInterval, 10, 60],
            ["water reminders", waterInterval, setWaterInterval, 15, 60],
          ].map(([label, val, setter, min, max]) => (
            <div key={label} style={{ marginBottom: 12 }}>
              <div style={{ marginBottom: 4, display: "flex", justifyContent: "space-between" }}>
                <span>{label}</span><span style={{ opacity: 0.5 }}>{val} min</span>
              </div>
              <input type="range" min={min} max={max} value={val}
                onChange={(e) => setter(Number(e.target.value))}
                style={{ width: "100%", accentColor: accent }} />
            </div>
          ))}
        </div>
      )}

      {/* Journal button */}
      <button onClick={() => { setShowJournal(!showJournal); setShowSettings(false); }}
        className="absolute cursor-pointer" style={{
          top: 16, right: 56, zIndex: 50, width: 32, height: 32,
          background: showJournal ? (night ? "rgba(255,255,255,0.2)" : "rgba(0,0,0,0.12)") : btnBg,
          border: `1px solid ${btnBorder}`, borderRadius: 8,
          display: "flex", alignItems: "center", justifyContent: "center",
          color: showJournal ? panelText : btnText, fontSize: 15, transition: "all 0.2s ease",
        }}>&#9997;</button>

      {showJournal && (
        <div className="absolute" style={{
          top: 56, right: 16, zIndex: 50, padding: "16px 20px", borderRadius: 16,
          background: panelBg, backdropFilter: "blur(15px)", border: `1px solid ${panelBorder}`,
          fontFamily: "'Courier New', monospace", color: panelText, fontSize: 12, width: 340,
          maxHeight: "70vh", display: "flex", flexDirection: "column",
        }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
            {["write", "past"].map(v => (
              <button key={v} onClick={() => setJournalView(v)} style={{
                flex: 1, padding: "6px 0", borderRadius: 8, cursor: "pointer",
                background: journalView === v ? accentLight : btnBg,
                border: `1px solid ${journalView === v ? accent : btnBorder}`,
                color: panelText, fontFamily: "'Courier New', monospace", fontSize: 12, letterSpacing: "1px",
              }}>{v === "past" && journalEntries.length > 0 ? `past (${journalEntries.length})` : v}</button>
            ))}
          </div>
          {journalView === "write" && (
            <div>
              <div style={{ padding: "10px 12px", borderRadius: 10, marginBottom: 12,
                background: accentLight, border: `1px solid ${accentBorder}`,
                fontSize: 12, lineHeight: 1.5, fontStyle: "italic", color: panelText, opacity: 0.8,
              }}>{journalPrompt}</div>
              <button onClick={() => setJournalPrompt(pickRandom(JOURNAL_PROMPTS))} style={{
                background: "none", border: "none", cursor: "pointer", color: subtleColor, fontSize: 11,
                marginBottom: 10, fontFamily: "'Courier New', monospace", padding: 0, transition: "color 0.2s ease",
              }}>&#8635; different prompt</button>
              <textarea value={journalText} onChange={(e) => setJournalText(e.target.value)}
                placeholder="write here..." style={{
                  width: "100%", minHeight: 100, maxHeight: 200, padding: "10px 12px", borderRadius: 10,
                  border: `1px solid ${btnBorder}`, background: btnBg, color: panelText,
                  fontFamily: "'Courier New', monospace", fontSize: 12, lineHeight: 1.5,
                  resize: "vertical", outline: "none", boxSizing: "border-box",
                }} />
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10 }}>
                <span style={{ opacity: 0.3, fontSize: 11 }}>{journalText.length > 0 && `${journalText.length} chars`}</span>
                <button onClick={() => { if (journalText.trim()) saveJournal(journalText); }}
                  disabled={!journalText.trim()} style={{
                    padding: "6px 16px", borderRadius: 10, cursor: journalText.trim() ? "pointer" : "default",
                    background: journalText.trim() ? accentLight : btnBg,
                    border: `1px solid ${journalText.trim() ? accent : btnBorder}`,
                    color: journalText.trim() ? panelText : subtleColor,
                    fontFamily: "'Courier New', monospace", fontSize: 12, transition: "all 0.2s ease",
                  }}>save</button>
              </div>
            </div>
          )}
          {journalView === "past" && (
            <div style={{ overflowY: "auto", flex: 1, maxHeight: "55vh" }}>
              {journalLoading ? <div style={{ opacity: 0.4, textAlign: "center", padding: 20 }}>loading...</div>
              : journalEntries.length === 0 ? <div style={{ opacity: 0.4, textAlign: "center", padding: 20, lineHeight: 1.6 }}>no entries yet.<br/>go write something!</div>
              : journalEntries.map(entry => (
                <div key={entry.id} style={{ padding: "12px 14px", borderRadius: 10, marginBottom: 10, background: btnBg, border: `1px solid ${btnBorder}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                    <span style={{ opacity: 0.4, fontSize: 11 }}>{new Date(entry.date).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" })}</span>
                    <button onClick={() => deleteJournal(entry.id)} style={{ background: "none", border: "none", cursor: "pointer", color: subtleColor, fontSize: 13, padding: "0 2px", fontFamily: "'Courier New', monospace" }}
                      onMouseEnter={(e) => { e.target.style.color = "rgba(255,100,100,0.6)"; }}
                      onMouseLeave={(e) => { e.target.style.color = subtleColor; }}
                    >&#10005;</button>
                  </div>
                  {entry.prompt && <div style={{ fontSize: 11, fontStyle: "italic", opacity: 0.4, marginBottom: 6, lineHeight: 1.4 }}>{entry.prompt}</div>}
                  <div style={{ lineHeight: 1.5, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{entry.text}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      <style>{`
        @keyframes emuFloat { 0%,100%{transform:scale(1,1) translateY(0)} 50%{transform:scale(1.01,0.99) translateY(3px)} }
        @keyframes emuBoom { 0%,100%{transform:scale(1.03,0.97) rotate(0deg)} 25%{transform:scale(1.03,0.97) rotate(4deg)} 75%{transform:scale(1.03,0.97) rotate(-4deg)} }
        @keyframes emuBounce { 0%,100%{transform:scale(1,1) translateY(0)} 20%{transform:scale(0.92,1.12) translateY(-10px)} 40%{transform:scale(1.08,0.9) translateY(0)} 60%{transform:scale(0.96,1.06) translateY(-5px)} 80%{transform:scale(1.03,0.97) translateY(0)} }
        @keyframes emuFlyAttempt { 0%,100%{transform:scale(1,1)} 20%{transform:scale(1.05,0.92)} 40%{transform:scale(0.95,1.06)} 60%{transform:scale(1.03,0.95)} 80%{transform:scale(0.97,1.03)} }
        @keyframes emuChase { 0%,100%{transform:scale(1,1)} 30%{transform:scale(1.05,0.95)} 60%{transform:scale(0.97,1.03)} }
        @keyframes secretSpin { 0%{transform:rotate(0deg) scale(1)} 25%{transform:rotate(10deg) scale(1.1)} 50%{transform:rotate(0deg) scale(1.2)} 75%{transform:rotate(-10deg) scale(1.1)} 100%{transform:rotate(0deg) scale(1)} }
        @keyframes creatureChase { 0%{transform:translateX(0) translateY(0)} 15%{transform:translateX(60px) translateY(-15px)} 30%{transform:translateX(-40px) translateY(10px)} 50%{transform:translateX(80px) translateY(-25px)} 65%{transform:translateX(30px) translateY(5px)} 80%{transform:translateX(-20px) translateY(-10px)} 100%{transform:translateX(0) translateY(0)} }
        @keyframes creatureFly { 0%{transform:translateY(0)} 25%{transform:translateY(-60px)} 40%{transform:translateY(-80px)} 55%{transform:translateY(-50px)} 75%{transform:translateY(-20px)} 85%{transform:translateY(8px)} 100%{transform:translateY(0)} }
        @keyframes wingDriftL { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-4deg)} }
        @keyframes wingDriftR { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(4deg)} }
        @keyframes wingFlapL { 0%{transform:rotate(8deg)} 50%{transform:rotate(-12deg)} 100%{transform:rotate(8deg)} }
        @keyframes wingFlapR { 0%{transform:rotate(-8deg)} 50%{transform:rotate(12deg)} 100%{transform:rotate(-8deg)} }
        @keyframes wingTwitchL { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-8deg)} }
        @keyframes wingTwitchR { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(8deg)} }
        @keyframes reminderPulse { 0%,100%{opacity:1} 50%{opacity:0.75} }
        @keyframes zzzFloat { 0%,100%{transform:translateY(0);opacity:0.5} 50%{transform:translateY(-8px);opacity:0.8} }
      `}</style>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(<DesktopPet />);
  </script>
</body>
</html>
