<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" fill="#0d0820" rx="80"/>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#7c3aed" stroke-width="3" opacity="0.4"/>

  <!-- Body glow -->
  <ellipse cx="256" cy="270" rx="110" ry="120" fill="#1e0a3c" opacity="0.9"/>
  <ellipse cx="256" cy="270" rx="100" ry="110" fill="url(#bodyGrad)"/>

  <!-- Wings -->
  <ellipse cx="148" cy="280" rx="70" ry="45" fill="#4c1d95" opacity="0.7" transform="rotate(-20 148 280)"/>
  <ellipse cx="364" cy="280" rx="70" ry="45" fill="#4c1d95" opacity="0.7" transform="rotate(20 364 280)"/>

  <!-- Wing glow edges -->
  <ellipse cx="148" cy="280" rx="70" ry="45" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.5" transform="rotate(-20 148 280)"/>
  <ellipse cx="364" cy="280" rx="70" ry="45" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.5" transform="rotate(20 364 280)"/>

  <!-- Face disc -->
  <circle cx="256" cy="235" r="75" fill="#2d1060" opacity="0.95"/>
  <circle cx="256" cy="235" r="72" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>

  <!-- Eyes -->
  <circle cx="228" cy="228" r="22" fill="#0d0820"/>
  <circle cx="284" cy="228" r="22" fill="#0d0820"/>
  <circle cx="228" cy="228" r="18" fill="#5eead4"/>
  <circle cx="284" cy="228" r="18" fill="#5eead4"/>
  <circle cx="228" cy="228" r="10" fill="#0d0820"/>
  <circle cx="284" cy="228" r="10" fill="#0d0820"/>
  <!-- Eye shine -->
  <circle cx="233" cy="222" r="4" fill="white" opacity="0.9"/>
  <circle cx="289" cy="222" r="4" fill="white" opacity="0.9"/>

  <!-- Antennae -->
  <line x1="240" y1="163" x2="220" y2="125" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <line x1="272" y1="163" x2="292" y2="125" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <circle cx="220" cy="122" r="6" fill="#a78bfa"/>
  <circle cx="292" cy="122" r="6" fill="#a78bfa"/>

  <!-- Beak -->
  <polygon points="256,248 248,262 264,262" fill="#fbbf24" opacity="0.9"/>

  <!-- Blush -->
  <ellipse cx="210" cy="250" rx="14" ry="8" fill="#f472b6" opacity="0.4"/>
  <ellipse cx="302" cy="250" rx="14" ry="8" fill="#f472b6" opacity="0.4"/>

  <!-- Body dots -->
  <circle cx="245" cy="295" r="4" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="260" cy="308" r="3" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="270" cy="292" r="4" fill="#8b5cf6" opacity="0.7"/>

  <!-- Overall glow overlay -->
  <circle cx="256" cy="250" r="170" fill="url(#glowGrad)" opacity="0.15"/>

  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e0a3c"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0d0820" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
